# Builds, pushes, and deploys the Docker image to Google Artifact Registry + Cloud Run after tests pass on main.
# Uses Workload Identity Federation (keyless auth).
# Required secrets: GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT

name: Docker Build and Push

on:
  workflow_run:
    workflows: [Tests]
    branches: [main]
    types: [completed]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: server/
          file: server/Dockerfile
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bigcat-app/server:latest
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bigcat-app/server:${{ github.event.workflow_run.head_sha }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy bigcat-server \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bigcat-app/server:${{ github.event.workflow_run.head_sha }} \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --update-secrets=DB_PASSWORD=bigcat-db-password:latest,REDIS_PASSWORD=bigcat-redis-password:latest,AUTH0_SPA_CLIENT_SECRET=bigcat-auth0-spa-client-secret:latest,AUTH0_MCP_CLIENT_SECRET=bigcat-auth0-mcp-client-secret:latest,X_API_KEY=bigcat-x-api-key:latest,X_API_KEY_SECRET=bigcat-x-api-key-secret:latest,X_ACCESS_TOKEN=bigcat-x-access-token:latest,X_ACCESS_TOKEN_SECRET=bigcat-x-access-token-secret:latest \
            --quiet
