# Local development environment
# Usage: docker compose up --build
# Copy server/.env.example.local → server/.env and fill in Auth0 values before starting.
# Copy client/.env.example → client/.env and fill in Auth0 values before starting.

services:
  postgres:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: bigcat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bigcat"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
    env_file:
      - ./server/.env
    environment:
      DB_HOST: postgres
      DB_NAME: bigcat
      DB_USER: postgres
      DB_PASSWORD: devpassword
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_USE_SSL: "false"
      API_BASE_URL: http://localhost:3000
    command: uvicorn main:app --host 0.0.0.0 --port 3000 --reload

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: builder
    ports:
      - "5173:5173"
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    env_file:
      - ./client/.env
    environment:
      VITE_API_URL: http://localhost:3000
    command: npm run dev -- --host

volumes:
  pgdata:
  redisdata:
